name: SQL INJECTION TEST

on:
  push:
    branches:
      - original
  pull_request:
    branches:
      - original

jobs:
  sonar_analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Clonando repositorio...
        uses: actions/checkout@v2
        with:
          fetch-depth: 0

      # Configurar JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v2
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Instalando Sonar Scanner...
        run: |
          wget https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-5.0.1.3006-linux.zip
          unzip sonar-scanner-cli-5.0.1.3006-linux.zip
          mv sonar-scanner-5.0.1.3006-linux sonar-scanner
          echo "PATH=$PATH:$(pwd)/sonar-scanner/bin" >> $GITHUB_ENV

      - name: Verificar SonarQube
        run: |
          curl -I http://rnodz-77-211-5-165.a.free.pinggy.link
        continue-on-error: true

      - name: Analizar con SonarQube...
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          sonar-scanner \
            -Dsonar.projectKey=SQLInjectionTest \
            -Dsonar.host.url=http://rnodz-77-211-5-165.a.free.pinggy.link \
            -Dsonar.login=$SONAR_TOKEN \
            -Dsonar.sources=src/Main.java \
            -Dsonar.qualitygate.wait=true \
            -X
            
      - name: Verificar Quality Gate...
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          status=$(curl -s -u $SONAR_TOKEN: "http://rnodz-77-211-5-165.a.free.pinggy.link/api/qualitygates/project_status?projectKey=SQLInjectionTest" | jq -r .projectStatus.status)
          if [ "$status" != "OK" ]; then
            echo "Quality Gate failed: $status"
            echo "View details on http://rnodz-77-211-5-165.a.free.pinggy.link/dashboard?id=SQLInjectionTest"
            exit 1
          else
            echo "Quality Gate passed: $status"
          fi
