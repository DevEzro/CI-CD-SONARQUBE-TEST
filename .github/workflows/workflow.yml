name: CI - Java & Python Build and Test

on:
  push:
    branches:
      - main
      - dev
      - feature

env: # Variables de entorno
  SONAR_TOKEN: ${{ secrets.DEV_TOKEN }} # Token for main branch

jobs:
  build-test:
    runs-on: ubuntu-latest

    env:
      JAVA_SRC: src/com/example/sqlinjectiontest
      PYTHON_DIR: python
      RESULTS_DIR: results

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    # ------------ JAVA BUILD & TEST ------------
    - name: ☕ Set up JDK 17 # Instala y configura Java TEMURIN
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: ☕ Setting JDK 17... # Instala y configura Java ZULU
      uses: actions/setup-java@v2
      with:
        java-version: '17' 
        distribution: 'zulu'

    - name: 🛠️ Compile Java code
      run: |
        mkdir -p ${{ env.RESULTS_DIR }}/java
        javac ${{ env.JAVA_SRC }}/Main.java -d ${{ env.RESULTS_DIR }}/java/

    - name: 🚀 Run Java main (if it has a main method)
      run: |
        cd ${{ env.RESULTS_DIR }}/java
        java com.example.sqlinjectiontest.Main | tee ../../${{ env.RESULTS_DIR }}/java/java-output.txt || true

    # ------------ PYTHON TESTS ------------
    - name: 🐍 Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: 3.10
      continue-on-error: true

    - name: 📦 Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov

    - name: 🧪 Run Python tests
      run: |
        mkdir -p ${{ env.RESULTS_DIR }}/python
        pytest ${{ env.PYTHON_DIR }} --cov=${{ env.PYTHON_DIR }} --cov-report=html:${{ env.RESULTS_DIR }}/python/htmlcov | tee ${{ env.RESULTS_DIR }}/python/pytest-output.txt || true
      continue-on-error: true
      
    # ------------ ARTIFACTS ------------
    - name: 📁 Upload test results
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: results/

    # ------------ SUMMARY ------------
    - name: 📋 Summary
      run: |
        echo "✅ Java and Python tasks completed."
        echo "📄 Outputs stored in 'results/' and uploaded as artifacts."


    - name: 📦 Install Sonar Scanner
      run: |
        wget https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-5.0.1.3006-linux.zip
        unzip sonar-scanner-cli-5.0.1.3006-linux.zip
        mv sonar-scanner-5.0.1.3006-linux sonar-scanner
        echo "$(pwd)/sonar-scanner/bin" >> $GITHUB_PATH

    - name: ☑️ Verify SonarQube...
      run: |
        curl -I http://rnghg-31-4-242-208.a.free.pinggy.link || true

    - name: ▶️ Run SonarQube scan
      run: |
        sonar-scanner \
          -Dsonar.projectKey=VariosTests \
          -Dsonar.host.url=http://rnghg-31-4-242-208.a.free.pinggy.link \
          -Dsonar.token=${{ secrets.DEV_TOKEN }} \
          -Dsonar.sources=python,src \
          -Dsonar.python.version=3.x \
          -Dsonar.qualitygate.wait=true \
          -X
    # ------------ OPTIONAL: Docker (commented) ------------
    # - name: 🐳 Run docker-compose (optional)
    #   run: docker-compose up -d
